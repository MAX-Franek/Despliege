apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: miportfolio
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/MAX-Franek/Despliege.git
    targetRevision: prod
    path: deploy/miporfolio
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: miportfolio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true