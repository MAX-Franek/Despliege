apiVersion: apps/v1
kind: Deployment
metadata:
  name: miportfolio
  namespace: miportfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: miportfolio
  template:
    metadata:
      labels:
        app: miportfolio
    spec:
      containers:
        - name: miportfolio
          image: franparradaw/ptaller-webserver:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
